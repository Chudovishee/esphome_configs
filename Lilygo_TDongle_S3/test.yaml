esphome:
  name: tdongle

esp32:
  variant: esp32s3
  framework:
    type: esp-idf
  flash_size: 16MB

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

font:
  - file: "gfonts://Roboto Mono"
    id: font_clock
    size: 28

binary_sensor:
  - platform: gpio
    pin: GPIO0
    name: Button
    on_press:
      then:
        - light.turn_on:
            id: lcd_backlight
            brightness: 100%
        - delay: 10s
        - light.turn_off: lcd_backlight

spi:
  - id: spi_led
    clk_pin: GPIO39
    mosi_pin: GPIO40
  - id: spi_lcd
    clk_pin: GPIO5
    mosi_pin: GPIO3

display:
  - platform: st7735
    spi_id: spi_lcd
    model: "INITR_MINI160X80"
    reset_pin: GPIO1
    cs_pin: GPIO4
    dc_pin: GPIO2
    rotation: 270
    device_width: 82
    device_height: 161
    col_start: 0
    row_start: 0
    eight_bit_color: true
    invert_colors: true
    use_bgr: true
    auto_clear_enabled: false
    update_interval: 1s  # Обновляем каждую секунду
    lambda: |-
      // Очистить дисплей
      it.fill(Color::BLACK);

      // Получить текущее время
      auto time = id(sntp_time).now();
      if (time.is_valid()) {
        // Форматируем время как HH:MM:SS
        it.strftime(
          it.get_width() / 2,
          it.get_height() / 2,
          id(font_clock),
          Color::WHITE,
          TextAlign::CENTER,
          "%H:%M:%S",
          time
        );
      } else {
        // Если время еще не синхронизировано
        it.printf(40, 40, id(font_clock), Color::WHITE, TextAlign::TOP_CENTER, "Sync...");
      }

output:
  - platform: ledc
    frequency: 2000
    pin: GPIO38
    inverted: True
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "LCD Backlight"
    id: lcd_backlight
    restore_mode: ALWAYS_OFF
# RGB Led, APA102 on GPIO39/GPIO40
  - platform: spi_led_strip
    spi_id: spi_led
    num_leds: 1
    name: "FastLED SPI Light"
    data_rate: 1MHz # Adjust as needed, APA102 supports up to 20MHz, 1MHz is a safe starting point


time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Moscow"  # Измени на свой часовой пояс