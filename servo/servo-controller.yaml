esphome:
  name: servo-controller
  friendly_name: Servo Controller

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  baud_rate: 0

# PWM выход
output:
  - platform: esp8266_pwm
    id: servo_output
    pin: D1          # GPIO5
    frequency: 50 Hz

# Серва
servo:
  - id: my_servo
    output: servo_output
    min_level: 3%
    max_level: 12%
    idle_level: 7.5%

# Ползунок в Home Assistant (-1.0 до 1.0)
number:
  - platform: template
    name: "Позиция сервы"
    id: servo_position
    min_value: -1.0
    max_value: 1.0
    step: 0.01
    initial_value: 0.0
    optimistic: true
    restore_value: true
    on_value:
      - servo.write:
          id: my_servo
          level: !lambda "return x;"

# Кнопки управления
button:
  - platform: template
    name: "Серво 0°"
    on_press:
      - number.set:
          id: servo_position
          value: -1.0

  - platform: template
    name: "Серво 90°"
    on_press:
      - number.set:
          id: servo_position
          value: 0.0

  - platform: template
    name: "Серво 180°"
    on_press:
      - number.set:
          id: servo_position
          value: 1.0

  - platform: template
    name: "Отключить серву"
    on_press:
      - servo.detach: my_servo

# Статус подключения
binary_sensor:
  - platform: status
    name: "Статус подключения"