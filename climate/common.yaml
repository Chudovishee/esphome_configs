esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: WARN
  baud_rate: 0


uart:
  id: ac_port
  baud_rate: 9600
  tx_pin: 1
  rx_pin: 3

climate:
  - platform: haier
    id: haier_ac
    protocol: smartAir2
    name: ${friendly_name} climate
    uart_id: ac_port
    visual:
      min_temperature: 16 °C
      max_temperature: 30 °C
      temperature_step: 1 °C
    supported_modes:
      - 'OFF'
      - HEAT_COOL
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY
    supported_swing_modes:
      - 'OFF'
      - VERTICAL
      - HORIZONTAL
      - BOTH
    supported_presets:
      - BOOST
      - COMFORT
      - AWAY

switch:
  - platform: haier
    health_mode:
      name: ${friendly_name} Climate health mode
    display:
      name: ${friendly_name} Climate display
