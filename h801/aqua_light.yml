esphome:
  name: aqua_light

esp8266:
  board: esp01_1m
  restore_from_flash: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
api:

preferences:
  flash_write_interval: 60s

output:
  - platform: esp8266_pwm
    pin: 12
    frequency: 1000 Hz
    id: pwm_b
  - platform: esp8266_pwm
    pin: 13
    frequency: 1000 Hz
    id: pwm_g
  - platform: esp8266_pwm
    pin: 15
    frequency: 1000 Hz
    id: pwm_r
  - platform: esp8266_pwm
    pin: 14
    frequency: 1000 Hz
    id: pwm_w1
  - platform: esp8266_pwm
    pin: 4
    frequency: 1000 Hz
    id: pwm_w2

fan:
  - platform: speed
    id: cooling_fan
    name: "Cooling fan"
    output: pwm_w1
    speed_count: 100
    restore_mode: ALWAYS_OFF
    internal: true

light:
  - platform: monochromatic
    id: point_one
    name: "Point one"
    output: pwm_r
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: monochromatic
    id: point_two
    name: "Point two"
    output: pwm_b
    restore_mode: RESTORE_DEFAULT_OFF

sensor:
  - platform: template
    id: point_one_pwm_level
    name: "Point one level"
    lambda: |-
      if (!id(point_one).current_values.is_on()) return 0.0f;
      return id(point_one).current_values.get_brightness() * 100.0f;
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 5s
    on_value:
      - script.execute: sync_fan_from_pwm

  - platform: template
    id: point_two_pwm_level
    name: "Point two level"
    lambda: |-
      if (!id(point_two).current_values.is_on()) return 0.0f;
      return id(point_two).current_values.get_brightness() * 100.0f;
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 5s
    on_value:
      - script.execute: sync_fan_from_pwm

script:
  - id: sync_fan_from_pwm
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return (id(point_one_pwm_level).state > 0.0f) ||
                     (id(point_two_pwm_level).state > 0.0f);
          then:
            - fan.turn_on:
                id: cooling_fan
                speed: 100
          else:
            - fan.turn_off: cooling_fan
